="line"><span class="keyword">let</span> NERDTreeShowHidden=<span class="number">1</span></span><br><span class="line"><span class="comment">&quot; 设置宽度</span></span><br><span class="line"><span class="comment">&quot; let NERDTreeWinSize=31</span></span><br><span class="line"><span class="comment">&quot; 忽略一下文件的显示</span></span><br><span class="line"><span class="keyword">let</span> NERDTreeIgnore=[<span class="string">&#x27;\.pyc&#x27;</span>,<span class="string">&#x27;\~$&#x27;</span>,<span class="string">&#x27;\.swp&#x27;</span>]</span><br><span class="line"><span class="comment">&quot; 打开 vim 文件及显示书签列表</span></span><br><span class="line"><span class="keyword">let</span> NERDTreeShowBookmarks=<span class="number">2</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&quot; 在终端启动vim时，共享NERDTree</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:nerdtree_tabs_open_on_console_startup</span>=<span class="number">1</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&quot;==============================================================================</span></span><br><span class="line"><span class="comment">&quot;  kien/ctrlp 插件</span></span><br><span class="line"><span class="comment">&quot;==============================================================================</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_map</span> = <span class="string">&#x27;&lt;c-p&gt;&#x27;</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_cmd</span> = <span class="string">&#x27;CtrlP&#x27;</span></span><br><span class="line"><span class="keyword">map</span> <span class="symbol">&lt;leader&gt;</span><span class="keyword">f</span> :CtrlPMRU<span class="symbol">&lt;CR&gt;</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_custom_ignore</span> = &#123;</span><br><span class="line">    \ <span class="string">&#x27;dir&#x27;</span>:  <span class="string">&#x27;\v[\/]\.(git|hg|svn|rvm)$&#x27;</span>,</span><br><span class="line">    \ <span class="string">&#x27;file&#x27;</span>: <span class="string">&#x27;\v\.(exe|so|dll|zip|tar|tar.gz|pyc)$&#x27;</span>,</span><br><span class="line">    \ <span class="string">&#x27;link&#x27;</span>: <span class="string">&#x27;some_bad_symbolic_links&#x27;</span>,</span><br><span class="line">    \ &#125;</span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_working_path_mode</span>=<span class="number">0</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_match_window_bottom</span>=<span class="number">1</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_max_height</span>=<span class="number">15</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_match_window_reversed</span>=<span class="number">0</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_mruf_max</span>=<span class="number">500</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:ctrlp_follow_symlinks</span>=<span class="number">1</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&quot;==============================================================================</span></span><br><span class="line"><span class="comment">&quot;  其他插件配置</span></span><br><span class="line"><span class="comment">&quot;==============================================================================</span></span><br><span class="line"></span><br><span class="line"><span class="string">&quot; disable waring:&quot;</span><span class="keyword">vim</span>-<span class="keyword">go</span>: initialized gopls<span class="comment">&quot;</span></span><br><span class="line"><span class="keyword">let</span> <span class="variable">g:go_gopls_enabled</span> = <span class="number">0</span></span><br></pre></td></tr></table></figure>
